<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วังปริงแคมป์ - ตารางจองห้องพัก</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🏕️ วังปริงแคมป์ ทุ่งสง</h1>
        <p>ตารางจองห้องพักประจำเดือน</p>
        
        <!-- User Info Section -->
        <div id="user-section" style="display: none; margin-top: 20px;">
            <div class="user-info">
                <span id="user-name"></span>
                <span class="user-position" id="user-position"></span>
            </div>
            <button id="logout-btn" class="logout-btn">ออกจากระบบ</button>
        </div>
        
        <!-- Login Link (show when not logged in) -->
        <div id="login-section" style="margin-top: 20px;">
            <a href="login.html" class="login-link">🔐 เข้าสู่ระบบ</a>
        </div>
    </header>

    <main>
        <section class="calendar-section">
            <h2>📅 เลือกเดือน</h2>
            <div class="month-selector">
                <button class="month-btn" data-month="Jan">ม.ค.</button>
                <button class="month-btn" data-month="Feb">ก.พ.</button>
                <button class="month-btn active" data-month="Mar">มี.ค.</button>
                <button class="month-btn" data-month="Apr">เม.ย.</button>
                <button class="month-btn" data-month="May">พ.ค.</button>
            </div>
        </section>

        <section class="bookings-section">
            <h2>📋 รายการจอง</h2>
            <div id="bookings-container">
                <p class="loading">กำลังโหลดข้อมูล...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>📅 ข้อมูลอัปเดตล่าสุด: มีนาคม 2026</p>
    </footer>

    <script src="app.js"></script>
    
    <style>
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        #user-name {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .user-position {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 15px;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .login-link {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 10px 25px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        .login-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        /* Permission-based UI */
        .requires-permission {
            display: none;
        }
        
        .has-permission {
            display: block;
        }
    </style>
</body>
</html>
